name: Merge-forward skill + long-lived branches

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  merge-forward:
    if: github.repository == 'qwibitai/nanoclaw'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into each skill + long-lived branch
        id: merge
        run: |
          FAILED=""
          SUCCEEDED=""

          # Skill branches (origin/skill/*) plus the v2 long-lived
          # sibling branches `channels` and `providers`.
          SKILL_BRANCHES=$(git branch -r --list 'origin/skill/*' | sed 's|origin/||' | xargs)
          LONG_LIVED="channels providers"

          ALL_BRANCHES="$SKILL_BRANCHES"
          for B in $LONG_LIVED; do
            if git rev-parse --verify "origin/$B" >/dev/null 2>&1; then
              ALL_BRANCHES="$ALL_BRANCHES $B"
            fi
          done
          ALL_BRANCHES=$(echo "$ALL_BRANCHES" | xargs)

          if [ -z "$ALL_BRANCHES" ]; then
            echo "No skill or long-lived branches found."
            exit 0
          fi

          for BRANCH in $ALL_BRANCHES; do
            SHORT_NAME=$(echo "$BRANCH" | sed 's|skill/||')
            echo ""
            echo "=== Processing $BRANCH ==="

            git checkout -B "$BRANCH" "origin/$BRANCH"

            if ! git merge main --no-edit; then
              echo "::warning::Merge conflict in $BRANCH"
              git merge --abort
              FAILED="$FAILED $SHORT_NAME"
              continue
            fi

            if git diff --quiet "origin/$BRANCH"; then
              echo "$BRANCH is already up to date with main."
              SUCCEEDED="$SUCCEEDED $SHORT_NAME"
              continue
            fi

            pnpm install --frozen-lockfile
            (cd container/agent-runner && bun install --frozen-lockfile) || true

            if ! pnpm run build; then
              echo "::warning::Host build failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SHORT_NAME"
              continue
            fi

            if ! pnpm test 2>/dev/null; then
              echo "::warning::Host tests failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SHORT_NAME"
              continue
            fi

            git push origin "$BRANCH"
            SUCCEEDED="$SUCCEEDED $SHORT_NAME"
            echo "$BRANCH merged and pushed successfully."
          done

          echo ""
          echo "=== Results ==="
          echo "Succeeded: $SUCCEEDED"
          echo "Failed: $FAILED"

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "succeeded=$SUCCEEDED" >> "$GITHUB_OUTPUT"

      - name: Open issue for failed merges
        if: steps.merge.outputs.failed != ''
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.merge.outputs.failed }}'.trim().split(/\s+/);
            const sha = context.sha.substring(0, 7);
            const body = [
              `The merge-forward workflow failed to merge \`main\` (${sha}) into the following branches:`,
              '',
              ...failed.map(s => `- \`${s}\`: merge conflict, build failure, or test failure`),
              '',
              'Please resolve manually:',
              '```bash',
              ...failed.map(s => [
                `git checkout ${s}`,
                `git merge main`,
                `# resolve conflicts, then: git push`,
                ''
              ]).flat(),
              '```',
              '',
              `Triggered by push to main: ${context.sha}`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Merge-forward failed for ${failed.length} branch(es) after ${sha}`,
              body,
              labels: ['skill-maintenance']
            });

      - name: Notify channel forks
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FORK_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const forks = [
              'nanoclaw-whatsapp',
              'nanoclaw-telegram',
              'nanoclaw-discord',
              'nanoclaw-slack',
              'nanoclaw-gmail',
              'nanoclaw-docker-sandboxes',
            ];
            const sha = context.sha.substring(0, 7);
            for (const repo of forks) {
              try {
                await github.rest.repos.createDispatchEvent({
                  owner: 'qwibitai',
                  repo,
                  event_type: 'upstream-main-updated',
                  client_payload: { sha: context.sha },
                });
                console.log(`Notified ${repo}`);
              } catch (e) {
                console.log(`Failed to notify ${repo}: ${e.message}`);
              }
            }
